
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: patient_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - patient_network

  nginx:
    image: nginx:alpine
    container_name: patient_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - patient_network

  db:
    image: mysql:8.0
    container_name: patient_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-patient_management}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-patient_user}
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - patient_network

  frontend:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: patient_frontend
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build && chown -R $(stat -c '%u:%g' /app) /app/node_modules /app/dist || true"
    networks:
      - patient_network

networks:
  patient_network:
    driver: bridge

volumes:
  db_data:
